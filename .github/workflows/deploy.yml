name: Supchat Secure CI/CD

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  security-and-build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # ── Secret Scanning ────────────────────────────────────────────
      - name: Run Gitleaks
        run: |
          curl -sSfL https://github.com/gitleaks/gitleaks/releases/download/v8.18.4/gitleaks_8.18.4_linux_x64.tar.gz | tar -xz
          ./gitleaks detect --source . --verbose --no-git --config .gitleaks.toml

      # ── Dockerfile Linting ─────────────────────────────────────────
      - name: Run Hadolint (API)
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: supachat/infra/docker/Dockerfile.api

      - name: Run Hadolint (WEB)
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: supachat/infra/docker/Dockerfile.web

      # ── Docker Login ───────────────────────────────────────────────
      - name: Login to DockerHub
        run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      # ── Build Images ───────────────────────────────────────────────
      - name: Build API Image
        run: |
          docker build \
            -t ${{ secrets.DOCKER_USERNAME }}/supchat-api:${{ github.sha }} \
            -t ${{ secrets.DOCKER_USERNAME }}/supchat-api:latest \
            -f supachat/infra/docker/Dockerfile.api \
            supachat/

      - name: Build Web Image
        run: |
          docker build \
            -t ${{ secrets.DOCKER_USERNAME }}/supchat-web:${{ github.sha }} \
            -t ${{ secrets.DOCKER_USERNAME }}/supchat-web:latest \
            -f supachat/infra/docker/Dockerfile.web \
            supachat/

      # ── Vulnerability Scanning (local images) ──────────────────────
      - name: Scan API Image
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          image-ref: ${{ secrets.DOCKER_USERNAME }}/supchat-api:${{ github.sha }}
          format: table
          exit-code: '1'
          severity: CRITICAL,HIGH

      - name: Scan Web Image
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          image-ref: ${{ secrets.DOCKER_USERNAME }}/supchat-web:${{ github.sha }}
          format: table
          exit-code: '1'
          severity: CRITICAL,HIGH

      # ── Push Images ────────────────────────────────────────────────
      - name: Push Images
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/supchat-api:latest
          docker push ${{ secrets.DOCKER_USERNAME }}/supchat-api:${{ github.sha }}
          docker push ${{ secrets.DOCKER_USERNAME }}/supchat-web:latest
          docker push ${{ secrets.DOCKER_USERNAME }}/supchat-web:${{ github.sha }}

      # ── Cleanup ────────────────────────────────────────────────────
      - name: Docker Logout
        if: always()
        run: docker logout

      # ── Deploy to EC2 ──────────────────────────────────────────────
      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd /opt/Supchat/supachat
            echo "📥 Pulling latest code..."
            git pull origin main
            echo "🐳 Deploying containers..."
            cd infra/docker
            docker compose pull
            docker compose up -d --remove-orphans

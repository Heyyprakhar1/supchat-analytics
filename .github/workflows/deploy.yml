name: Supchat Secure CI/CD

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  security-and-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        with:
          args: detect --source . --verbose

      - name: Run Hadolint (API)
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: supachat/infra/docker/Dockerfile.api  # fix 1: added supachat/ prefix

      - name: Run Hadolint (WEB)
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: supachat/infra/docker/Dockerfile.web   # fix 1: added supachat/ prefix

      - name: Login to DockerHub
        run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      - name: Build API Image
        run: docker build -t ${{ secrets.DOCKER_USERNAME }}/supchat-api:${{ github.sha }} -t ${{ secrets.DOCKER_USERNAME }}/supchat-api:latest -f supachat/infra/docker/Dockerfile.api supachat/  # fix 2+5: path + SHA tag + context

      - name: Build Web Image
        run: docker build -t ${{ secrets.DOCKER_USERNAME }}/supchat-web:${{ github.sha }} -t ${{ secrets.DOCKER_USERNAME }}/supchat-web:latest -f supachat/infra/docker/Dockerfile.web supachat/   # fix 2+5: path + SHA tag + context

      - name: Scan API Image
        uses: aquasecurity/trivy-action@0.28.0  # fix 4: pinned version
        with:
          image-ref: docker.io/${{ secrets.DOCKER_USERNAME }}/supchat-api:latest  # fix 3: explicit registry
          format: table
          exit-code: '1'
          severity: CRITICAL,HIGH

      - name: Scan Web Image
        uses: aquasecurity/trivy-action@0.28.0  # fix 4: pinned version
        with:
          image-ref: docker.io/${{ secrets.DOCKER_USERNAME }}/supchat-web:latest  # fix 3: explicit registry
          format: table
          exit-code: '1'
          severity: CRITICAL,HIGH

      - name: Push Images
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/supchat-api:latest
          docker push ${{ secrets.DOCKER_USERNAME }}/supchat-api:${{ github.sha }}  # fix 5: push SHA tag too
          docker push ${{ secrets.DOCKER_USERNAME }}/supchat-web:latest
          docker push ${{ secrets.DOCKER_USERNAME }}/supchat-web:${{ github.sha }}  # fix 5: push SHA tag too

  deploy:
    needs: security-and-build
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to EC2
        uses: appleboy/ssh-action@v0.1.6
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd /opt/Supchat/supachat || { echo "Deploy dir not found"; exit 1; }  # fix 7: error handling
            docker compose pull
            docker compose up -d --remove-orphans


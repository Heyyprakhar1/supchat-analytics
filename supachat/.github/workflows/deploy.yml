name: Supchat Secure CI/CD

on:
push:
branches:
- main
workflow_dispatch:

jobs:
security-and-build:
runs-on: ubuntu-latest

```
steps:
  - name: Checkout code
    uses: actions/checkout@v3

  # 🔍 Gitleaks
  - name: Run Gitleaks
    uses: gitleaks/gitleaks-action@v2
    with:
      args: detect --source . --verbose

  # 🐳 Hadolint
  - name: Run Hadolint (API)
    uses: hadolint/hadolint-action@v3.1.0
    with:
      dockerfile: infra/docker/Dockerfile.api

  - name: Run Hadolint (WEB)
    uses: hadolint/hadolint-action@v3.1.0
    with:
      dockerfile: infra/docker/Dockerfile.web

  # 🐳 Docker Login
  - name: Login to DockerHub
    run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

  # 🏗 Build API
  - name: Build API Image
    run: docker build -t ${{ secrets.DOCKER_USERNAME }}/supchat-api:latest -f infra/docker/Dockerfile.api .

  # 🏗 Build Web
  - name: Build Web Image
    run: docker build -t ${{ secrets.DOCKER_USERNAME }}/supchat-web:latest -f infra/docker/Dockerfile.web .

  # 🔒 Trivy Scan
  - name: Scan API Image
    uses: aquasecurity/trivy-action@master
    with:
      image-ref: ${{ secrets.DOCKER_USERNAME }}/supchat-api:latest
      format: table
      exit-code: 1
      severity: CRITICAL,HIGH

  - name: Scan Web Image
    uses: aquasecurity/trivy-action@master
    with:
      image-ref: ${{ secrets.DOCKER_USERNAME }}/supchat-web:latest
      format: table
      exit-code: 1
      severity: CRITICAL,HIGH

  # 📤 Push
  - name: Push Images
    run: |
      docker push ${{ secrets.DOCKER_USERNAME }}/supchat-api:latest
      docker push ${{ secrets.DOCKER_USERNAME }}/supchat-web:latest
```

deploy:
needs: security-and-build
runs-on: ubuntu-latest

```
steps:
  - name: Deploy to EC2
    uses: appleboy/ssh-action@v0.1.6
    with:
      host: ${{ secrets.EC2_HOST }}
      username: ubuntu
      key: ${{ secrets.EC2_SSH_KEY }}
      script: |
        cd /opt/Supchat/supachat
        docker compose pull
        docker compose up -d --remove-orphans
```

version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: supachat-db
    restart: unless-stopped
    environment:
      - POSTGRES_USER=supachat
      - POSTGRES_PASSWORD=password123
      - POSTGRES_DB=supachat_test
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - /opt/Supchat/supachat/infra/db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      - supachat-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U supachat -d supachat_test"]
      interval: 5s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 256M

  api:
    image: heyyprakhar1/supchat-api:latest
    container_name: supachat-api
    restart: unless-stopped
    environment:
      - DATABASE_URL=postgresql://supachat:password123@db:5432/supachat_test
      - MCP_SERVER_COMMAND=npx
      - MCP_SERVER_ARGS=-y @modelcontextprotocol/server-postgres
    depends_on:
      db:
        condition: service_healthy
    networks:
      - supachat-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 256M

  web:
    image: heyyprakhar1/supchat-web:latest
    container_name: supachat-web
    restart: unless-stopped
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost
    depends_on:
      api:
        condition: service_healthy
    networks:
      - supachat-network
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 256M

  nginx:
    image: nginx:alpine
    container_name: supachat-nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - /opt/Supchat/supachat/infra/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - web
      - api
    networks:
      - supachat-network
    deploy:
      resources:
        limits:
          cpus: '0.25'
          memory: 128M
        reservations:
          cpus: '0.10'
          memory: 64M

  ollama:
    image: ollama/ollama:latest
    container_name: supachat-ollama
    restart: unless-stopped
    volumes:
      - ollama-data:/root/.ollama
    networks:
      - supachat-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11434/api/tags"]
      interval: 30s
      timeout: 10s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 2G
        reservations:
          cpus: '0.5'
          memory: 1G

  prometheus:
    image: prom/prometheus:latest
    container_name: supachat-prometheus
    restart: unless-stopped
    volumes:
      - /opt/Supchat/supachat/infra/monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    ports:
      - "9090:9090"
    networks:
      - supachat-network
    deploy:
      resources:
        limits:
          cpus: '0.25'
          memory: 256M
        reservations:
          cpus: '0.10'
          memory: 128M

  grafana:
    image: grafana/grafana:latest
    container_name: supachat-grafana
    restart: unless-stopped
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin123
      - GF_INSTALL_PLUGINS=grafana-clock-panel
    volumes:
      - grafana-data:/var/lib/grafana
    ports:
      - "3001:3000"
    networks:
      - supachat-network
    deploy:
      resources:
        limits:
          cpus: '0.25'
          memory: 256M
        reservations:
          cpus: '0.10'
          memory: 128M

  loki:
    image: grafana/loki:latest
    container_name: supachat-loki
    restart: unless-stopped
    ports:
      - "3100:3100"
    volumes:
      - /opt/Supchat/supachat/infra/monitoring/loki-config.yml:/etc/loki/local-config.yaml:ro
      - loki-data:/loki
    networks:
      - supachat-network
    deploy:
      resources:
        limits:
          cpus: '0.25'
          memory: 256M
        reservations:
          cpus: '0.10'
          memory: 128M

  promtail:
    image: grafana/promtail:latest
    container_name: supachat-promtail
    restart: unless-stopped
    volumes:
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /opt/Supchat/supachat/infra/monitoring/promtail-config.yml:/etc/promtail/config.yml:ro
    networks:
      - supachat-network
    command: -config.file=/etc/promtail/config.yml
    deploy:
      resources:
        limits:
          cpus: '0.10'
          memory: 128M
        reservations:
          cpus: '0.05'
          memory: 64M

  node-exporter:
    image: prom/node-exporter:latest
    container_name: supachat-node-exporter
    restart: unless-stopped
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    command:
      - '--path.procfs=/host/proc'
      - '--path.rootfs=/rootfs'
      - '--path.sysfs=/host/sys'
      - '--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)'
    ports:
      - "9100:9100"
    networks:
      - supachat-network
    deploy:
      resources:
        limits:
          cpus: '0.10'
          memory: 128M
        reservations:
          cpus: '0.05'
          memory: 64M

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:latest
    container_name: supachat-cadvisor
    restart: unless-stopped
    privileged: true
    devices:
      - /dev/kmsg:/dev/kmsg
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker:/var/lib/docker:ro
      - /cgroup:/cgroup:ro
    ports:
      - "9323:8080"
    networks:
      - supachat-network
    deploy:
      resources:
        limits:
          cpus: '0.25'
          memory: 256M
        reservations:
          cpus: '0.10'
          memory: 128M

networks:
  supachat-network:
    driver: bridge

volumes:
  postgres-data:
  ollama-data:
  prometheus-data:
  grafana-data:
  loki-data:
